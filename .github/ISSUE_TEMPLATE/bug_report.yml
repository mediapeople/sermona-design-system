name: Bug report
description: Something in the handbook, theme, or tokens does not work as documented
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What went wrong?
      description: Clear description of the bug or doc error.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: e.g. URL, page, snippet, or `npm run …` command.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "e.g. 22.22.0"
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, browser, etc.
